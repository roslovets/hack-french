name: "🚀 Publish Hack French"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; текущий не отменяем, чтобы не оборвать публикацию.
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    steps:
      - name: "📦 Checkout repository"
        uses: actions/checkout@v6

      - name: "🥟 Set up Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: "📥 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🔧 Build"
        run: bun run build
        # Проект отдаётся из https://<user>.github.io/<repo>/ → base = /<repo>/.
        # Для user/org-сайта (<user>.github.io) или своего домена замени на "/".
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"

      - name: "🧭 SPA fallback (deep links → index)"
        # GitHub Pages отдаёт 404.html на неизвестный путь; копия index.html
        # позволяет клиентскому роутеру открывать /case/... при перезагрузке.
        run: cp dist/index.html dist/404.html

      - name: "⚙️ Configure GitHub Pages"
        uses: actions/configure-pages@v6

      - name: "📤 Upload static site"
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: "🌐 Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "🚀 Deploy site"
        id: deployment
        uses: actions/deploy-pages@v5
